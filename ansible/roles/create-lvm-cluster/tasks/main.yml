---

- name: Configure LVM locking_type = 1
  lineinfile:
    path: /etc/lvm/lvm.conf
    search_string: "locking_type="
    line: "    locking_type = 1"
    insertafter: "^\\s*global\\s*\\{"
  notify: Restart lvmlockd

- name: Enable use_lvmlockd
  lineinfile:
    path: /etc/lvm/lvm.conf
    search_string: "use_lvmlockd ="
    line: "    use_lvmlockd = 1"
    insertafter: "^\\s*global\\s*\\{"
  notify: Restart lvmlockd

- name: Enable use_lvmlockd
  lineinfile:
    path: /etc/lvm/lvm.conf
    search_string: "use_lvmlockd ="
    line: "    use_lvmlockd = 1"
    insertafter: "^\\s*global\\s*\\{"
  notify: Restart lvmlockd

- name: Verify LVM configuration
  shell: lvm dumpconfig global/locking_type global/use_lvmlockd
  register: lvm_config
  changed_when: false

- name: Show LVM configuration
  debug:
    var: lvm_config.stdout_lines

- name: Fail if locking_type is not 1
  fail:
    msg: "locking_type must be 1 for lvmlockd! Current: {{ lvm_config.stdout }}"
  when: "'locking_type=1' not in lvm_config.stdout"

- name: Fail if use_lvmlockd is not 1
  fail:
    msg: "use_lvmlockd must be 1! Current: {{ lvm_config.stdout }}"
  when: "'use_lvmlockd=1' not in lvm_config.stdout"


  # Check new vg_root
- name: Verify DLM is running before LVM
  command: systemctl is-active dlm
  register: dlm_status
  changed_when: false
  ignore_errors: true
  failed_when: dlm_status.stdout != 'active'

- name: Show DLM status
  debug:
    msg: "DLM service is {{ dlm_status.stdout }} - OK to proceed with LVM"

- name: Verify iSCSI disk is available
  stat:
    path: "{{ lvm_pv_device }}"
  register: pv_device
  failed_when: not pv_device.stat.exists

- name: Show iSCSI disk status
  debug:
    msg: "iSCSI disk {{ lvm_pv_device }} is available"

- name: Scan for existing PVs
  command: pvscan
  changed_when: false

- name: Scan for existing VGs
  command: vgscan
  changed_when: false

- name: Scan for existing LVs
  command: lvscan
  changed_when: false

- name: Check if VG already exists
  command: vgs {{ lvm_vg_name }}
  register: vg_check
  changed_when: false
  failed_when: false

- name: Show VG status
  debug:
    msg: >-
      VG {{ lvm_vg_name }} 
      {% if vg_check.rc == 0 %}already exists{% else %}does not exist{% endif %}

- name: Create lvm cluster
  block:    
    
    - name: Create volume group
      lvg:
          vg: "{{ lvm_vg_name }}"
          pvs: "{{ lvm_pv_device }}"  
          vg_options: "--locktype dlm"
          state: present
      when: vg_check.rc != 0 

    - name: Show VG creation result
      debug:
        msg: "Volume Group {{ lvm_vg_name }} created with locktype dlm"
      when:
        - vg_check.rc != 0

    - name: Check if LV already exists
      command: lvs {{ lvm_vg_name }}/{{ lvm_lv_name }}
      register: lv_check
      changed_when: false
      failed_when: false

    - name: Create Logical Volume
      community.general.lvol:
        vg: "{{ lvm_vg_name }}"
        lv: "{{ lvm_lv_name }}"
        size: "{{ lvm_lv_size }}"
        state: present
        shrink: no
      when:
        - lv_check.rc != 0
  
    - name: Show LV creation result
      debug:
        msg: "Logical Volume {{ lvm_lv_name }} created ({{ lvm_lv_size }})"
      when: 
        - lv_check.rc != 0

  when: role == "master-gfs" 

- name: Activate Logical Volume on all nodes
  command: lvchange -asy {{ lvm_vg_name }}/{{ lvm_lv_name }}
  changed_when: false
  failed_when: false

- name: Verify PV creation
  command: pvs {{ lvm_pv_device }}
  register: pvs_result
  changed_when: false
  tags: [lvm, verify]

- name: Verify VG creation
  command: vgs {{ lvm_vg_name }}
  register: vgs_result
  changed_when: false
  tags: [lvm, verify]

- name: Verify LV creation
  command: lvs {{ lvm_vg_name }}/{{ lvm_lv_name }}
  register: lvs_result
  changed_when: false
  tags: [lvm, verify]

- name: Show LVM structure
  debug:
    msg: |
      ===== LVM Structure on {{ inventory_hostname }} =====
      PV: {{ pvs_result.stdout_lines[1] | default('N/A') }}
      VG: {{ vgs_result.stdout_lines[1] | default('N/A') }}
      LV: {{ lvs_result.stdout_lines[1] | default('N/A') }}
  tags: [lvm, verify]


- name: Verify VG locktype is DLM
  command: vgs -o +vg_locktype {{ lvm_vg_name }}
  register: locktype_check
  changed_when: false
  tags: [lvm, verify]

- name: Show locktype status
  debug:
    msg: "VG {{ lvm_vg_name }} locktype: {{ locktype_check.stdout_lines[1] | default('unknown') }}"
  tags: [lvm, verify]

- name: Fail if locktype is not dlm
  fail:
    msg: "VG locktype must be 'dlm' for cluster! Current: {{ locktype_check.stdout }}"
  when: 
    - "'dlm' not in locktype_check.stdout"
    - inventory_hostname == groups['gfs_nodes'][0]
  tags: [lvm, verify]

- name: Display LVM setup summary
  debug:
    msg: |
      ╔════════════════════════════════════════════════════════════════════════════════╗
      ║              LVM CLUSTER SETUP COMPLETE                                        ║
      ╠════════════════════════════════════════════════════════════════════════════════╣
      ║  Host: {{ inventory_hostname | default('unknown') | center(50) }}              ║
      ║  First Node: {{ (inventory_hostname == groups['gfs-nodes'][0]) | center(42) }} ║
      ╠════════════════════════════════════════════════════════════════════════════════╣
      ║  PV: {{ lvm_pv_device | center(52) }}                                          ║
      ║  VG: {{ lvm_vg_name | center(52) }}                                            ║
      ║  LV: {{ lvm_lv_name | center(52) }}                                            ║
      ║  Size: {{ lvm_lv_size | center(52) }}                                          ║
      ╠════════════════════════════════════════════════════════════════════════════════╣
      ║  Lock Type: DLM (cluster-aware)                                                ║
      ║  Ready for GFS2: YES                                                           ║
      ╚════════════════════════════════════════════════════════════════════════════════╝