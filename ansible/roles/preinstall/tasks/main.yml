--- 

- name: Update /etc/hosts
  template:
    src: templates/hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: '0644'
    backup: yes

- name: install packages target
  apt:
    name: "{{ iscsi_target_packages }}"
    state: present
    update_cache: yes
  when: role == "iscsi-target"

- name: install packages iscsi
  apt:
    name: "{{ iscsi_initiator_packages }}"
    state: present
    update_cache: yes
  when: role == "gfs"

- name: install packages gfs cluster
  apt:
    name: "{{ iscsi_gfs_packages }}"
    state: present
    update_cache: yes
  when: role == "gfs"

