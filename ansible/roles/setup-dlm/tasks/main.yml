---

- name: Enable and start DLM service
  service: 
    name: dlm
    enabled: true
    state: started

- name: Wait for DLM to be ready
  wait_for:
    timeout: 30
    sleep: 5

- name: Check DLM service status
  command: systemctl is-active dlm
  register: dlm_status
  changed_when: false
  ignore_errors: true
  failed_when: dlm_status.stdout != 'active'

- name: Show DLM service status
  debug:
    msg: "DLM service is {{ dlm_status.stdout }}"